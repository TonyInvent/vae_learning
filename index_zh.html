<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAE的故事：从像素到机器人策略</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css">
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>

<style>
  :root { --text: #24292e; --bg: #ffffff; --code-bg: #f6f8fa; --border: #e1e4e8; --link: #0366d6; --muted: #6a737d; --width: 800px; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", "PingFang SC", Helvetica, Arial, sans-serif; font-size: 17px; line-height: 1.85; color: var(--text); background: var(--bg); }
  article { max-width: var(--width); margin: 0 auto; padding: 40px 24px 80px; }
  h1 { font-size: 2.2em; border-bottom: 1px solid var(--border); padding-bottom: .3em; margin: 48px 0 16px; }
  h2 { font-size: 1.6em; border-bottom: 1px solid var(--border); padding-bottom: .25em; margin: 40px 0 12px; }
  h3 { font-size: 1.25em; margin: 32px 0 10px; }
  h4 { font-size: 1.05em; margin: 24px 0 8px; }
  p { margin: 0 0 16px; }
  ul, ol { padding-left: 2em; margin: 0 0 16px; }
  li { margin: 4px 0; }
  blockquote { border-left: 4px solid var(--link); color: var(--muted); padding: 0 16px; margin: 0 0 16px; }
  blockquote p:last-child { margin-bottom: 0; }
  a { color: var(--link); text-decoration: none; }
  a:hover { text-decoration: underline; }
  code { font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; font-size: 0.9em; background: var(--code-bg); padding: 2px 6px; border-radius: 3px; }
  pre code { background: none; padding: 0; }
  pre { background: var(--code-bg); border: 1px solid var(--border); border-radius: 6px; padding: 16px; overflow-x: auto; margin: 0 0 16px; line-height: 1.45; }
  table { border-collapse: collapse; width: 100%; margin: 0 0 16px; }
  th, td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
  th { background: var(--code-bg); font-weight: 600; }
  hr { border: 0; border-top: 1px solid var(--border); margin: 32px 0; }
  strong { font-weight: 600; }
  .katex-display { margin: 16px 0; overflow-x: auto; overflow-y: hidden; }
  nav { max-width: var(--width); margin: 0 auto; padding: 16px 24px 0; font-size: 0.9em; color: var(--muted); display: flex; justify-content: space-between; }
  nav a { color: var(--muted); }
  footer { max-width: var(--width); margin: 0 auto; padding: 0 24px 40px; text-align: center; font-size: 0.95em; color: var(--muted); }
  footer a { color: var(--link); }
  #loading { text-align: center; padding: 80px 20px; color: var(--muted); font-size: 1.1em; }
  #error { text-align: center; padding: 80px 20px; color: #cb2431; display: none; }
  @media (max-width: 850px) { body { font-size: 16px; } article { padding: 24px 16px 60px; } h1 { font-size: 1.7em; } h2 { font-size: 1.35em; } pre { padding: 12px; font-size: 0.85em; } }
</style>
</head>
<body>

<nav>
  <span><a href="https://github.com/TonyInvent/vae_learning">GitHub</a> · <a href="vae_introduction_zh.md">原始 Markdown</a></span>
  <span><a href="index.html">Read in English</a></span>
</nav>

<article>
  <div id="loading">正在加载 VAE 的故事……</div>
  <div id="error">加载文档失败。请尝试刷新，或直接阅读<a href="vae_introduction_zh.md">原始 Markdown</a>。</div>
  <div id="content"></div>
</article>

<footer>
  <p><a href="index.html">Read in English</a></p>
</footer>

<script>
(async function () {
  const content = document.getElementById('content');
  const loading = document.getElementById('loading');
  const errorEl = document.getElementById('error');
  try {
    const resp = await fetch('vae_introduction_zh.md');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    let md = await resp.text();
    const mathBlocks = [];
    md = md.replace(/\$\$([\s\S]*?)\$\$/g, (_, f) => { mathBlocks.push({type:'display',formula:f.trim()}); return '\x00MATH'+(mathBlocks.length-1)+'\x00'; });
    md = md.replace(/(?<!\$)\$(?!\$)([^\$\n]+?)\$(?!\$)/g, (_, f) => { mathBlocks.push({type:'inline',formula:f.trim()}); return '\x00MATH'+(mathBlocks.length-1)+'\x00'; });
    marked.setOptions({ breaks: false, gfm: true });
    let html = marked.parse(md);
    html = html.replace(/\x00MATH(\d+)\x00/g, (_, idx) => {
      const { type, formula } = mathBlocks[parseInt(idx)];
      try { return katex.renderToString(formula, { displayMode: type==='display', throwOnError: false, trust: true }); }
      catch(e) { return '<code>'+formula+'</code>'; }
    });
    content.innerHTML = html;
    loading.style.display = 'none';
    document.querySelectorAll('pre code').forEach(block => { hljs.highlightElement(block); });
    renderMathInElement(content, { delimiters: [{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}], throwOnError: false, trust: true });
  } catch(e) { loading.style.display='none'; errorEl.style.display='block'; console.error(e); }
})();
</script>
</body>
</html>
